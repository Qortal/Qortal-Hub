<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="qortino-head-shell-fill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(398 284) rotate(51.2) scale(626 690)">
      <stop offset="0" stop-color="#5A6885"/>
      <stop offset="0.22" stop-color="#3B465D"/>
      <stop offset="0.62" stop-color="#1A212C"/>
      <stop offset="1" stop-color="#0F141C"/>
    </radialGradient>
    <radialGradient id="qortino-head-highlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 236) rotate(90) scale(260 320)">
      <stop offset="0" stop-color="#D0E2FF" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#8FA9D0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0E1521" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="qortino-head-stroke" x1="234" y1="126" x2="776" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B4C9EB" stop-opacity="0.28"/>
      <stop offset="0.54" stop-color="#7187AA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#273244" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="qortino-head-face-fill" x1="512" y1="374" x2="512" y2="606" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16202D"/>
      <stop offset="1" stop-color="#0A1017"/>
    </linearGradient>
    <radialGradient id="qortino-head-face-sheen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(454 390) rotate(61.1) scale(164 198)">
      <stop stop-color="#8DB8FF" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0B1119" stop-opacity="0"/>
    </radialGradient>
    <filter id="qortino-head-eye-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="qortino-head-inner-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <path id="qortino-head-mouth" d="M0 0C16 13.6 48 13.6 64 0" />
  </defs>

  <g id="qortino-head-only">
    <g id="qortino-shell">
      <circle cx="512" cy="544" r="336" fill="url(#qortino-head-shell-fill)" />
      <circle cx="512" cy="544" r="332" stroke="url(#qortino-head-stroke)" stroke-width="8" />
      <circle cx="512" cy="544" r="336" fill="url(#qortino-head-highlight)" />
      <ellipse cx="512" cy="544" rx="244" ry="244" fill="#0A1220" fill-opacity="0.08" filter="url(#qortino-head-inner-soft)" />
    </g>

    <g id="qortino-face">
      <rect x="318" y="372" width="388" height="268" rx="134" fill="url(#qortino-head-face-fill)" />
      <rect x="322" y="376" width="380" height="260" rx="130" stroke="#B3D0FF" stroke-opacity="0.13" stroke-width="4" />
      <rect x="318" y="372" width="388" height="268" rx="134" fill="url(#qortino-head-face-sheen)" />
      <rect x="336" y="390" width="352" height="232" rx="116" fill="url(#qortino-head-face-sheen)" opacity="0.55" />
    </g>

    <g id="qortino-features">
      <g id="qortino-left-eye">
        <ellipse cx="434" cy="472" rx="24" ry="24" fill="#DDEBFF" fill-opacity="0.3" filter="url(#qortino-head-eye-soft)" />
        <ellipse cx="434" cy="472" rx="18" ry="18" fill="#E5F0FF" />
      </g>
      <g id="qortino-right-eye">
        <ellipse cx="590" cy="472" rx="24" ry="24" fill="#DDEBFF" fill-opacity="0.3" filter="url(#qortino-head-eye-soft)" />
        <ellipse cx="590" cy="472" rx="18" ry="18" fill="#E5F0FF" />
      </g>
      <g id="qortino-mouth-group" transform="translate(448 558)">
        <use href="#qortino-head-mouth" stroke="#DDEBFF" stroke-opacity="0.82" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
  </g>
</svg>
