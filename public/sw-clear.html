<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Qortal Hub Preview Cache</title>
    <style>
      body {
        align-items: center;
        background: #06080d;
        color: rgba(240, 244, 252, 0.92);
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        max-width: 420px;
        padding: 32px;
        text-align: center;
      }

      p {
        color: rgba(214, 221, 233, 0.62);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Clearing local preview cache</h1>
      <p>Qortal Hub will reload automatically in a moment.</p>
    </main>
    <script>
      (async () => {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              registrations.map((registration) => registration.unregister())
            );
          }

          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }
        } finally {
          window.location.replace('/?cache-cleared=1');
        }
      })();
    </script>
  </body>
</html>
